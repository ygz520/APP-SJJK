<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比地数据接口服务 - 企业数据API开放平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            text-align: center;
        }
        
        .header-back {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            pointer-events: none;
        }
        
        /* 搜索区域 */
        .search-section {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            padding: 12px 16px 16px;
            z-index: 99;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .search-input {
            flex: 1;
            border: none;
            padding: 10px 0;
            font-size: 15px;
            outline: none;
            background: transparent;
        }
        
        .search-btn {
            background: #1890ff;
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 分类标签 */
        .category-section {
            position: fixed;
            top: 120px;
            left: 0;
            right: 0;
            background: #fff;
            padding: 12px 0;
            z-index: 98;
            border-bottom: 1px solid #f0f0f0;
        }

        .category-scroll {
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 16px;
            gap: 12px;
            scrollbar-width: none;
            min-height: 36px;
        }
        
        .category-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .category-tag {
            flex-shrink: 0;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 16px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .category-tag.active {
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            color: #fff;
        }
        
        /* 主内容 */
        .main-content {
            padding-top: 200px;
            padding-left: 12px;
            padding-right: 12px;
        }
        
        /* 统计 */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        
        .stats-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .stats-count {
            font-size: 13px;
            color: #666;
        }
        
        .stats-count span {
            color: #1890ff;
            font-weight: 600;
        }
        
        /* 接口列表 */
        .api-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .api-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .api-card:active {
            background: #f9f9f9;
        }
        
        .api-card-content {
            pointer-events: none;
        }
        
        .api-card .api-actions {
            pointer-events: auto;
        }
        
        .api-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .api-id {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .api-method {
            font-size: 11px;
            color: #52c41a;
            background: #f6ffed;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .api-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .api-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .api-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid #f5f5f5;
        }
        
        .api-category {
            font-size: 12px;
            color: #1890ff;
            background: #e6f7ff;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .api-actions {
            display: flex;
            gap: 8px;
        }
        
        .api-btn {
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        
        .api-btn.detail {
            background: #f5f5f5;
            color: #666;
        }
        
        .api-btn.apply {
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            color: #fff;
        }
        
        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 20px;
        }
        
        .load-more-btn {
            background: #fff;
            border: 1px solid #e8e8e8;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-sheet {
            background: #fff;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #e5e5e5;
            border-radius: 2px;
            margin: 12px auto 16px;
        }
        
        /* 详情弹窗 */
        .detail-content {
            padding: 0 20px 24px;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .detail-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .detail-icon i {
            font-size: 24px;
            color: #fff;
        }
        
        .detail-title-wrap {
            flex: 1;
        }
        
        .detail-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .detail-id {
            font-size: 13px;
            color: #999;
        }
        
        .detail-section {
            margin-bottom: 16px;
        }
        
        .detail-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 6px;
        }
        
        .detail-value {
            font-size: 15px;
            color: #333;
            line-height: 1.6;
        }
        
        .detail-path {
            background: #f5f7fa;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            color: #666;
            word-break: break-all;
        }
        
        .detail-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .detail-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        
        .detail-btn.cancel {
            background: #f5f5f5;
            color: #666;
        }
        
        .detail-btn.apply {
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            color: #fff;
        }
        
        /* 申请弹窗 */
        .apply-content {
            padding: 0 20px 28px;
        }
        
        .apply-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .apply-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .apply-close {
            width: 36px;
            height: 36px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }
        
        .apply-close i {
            font-size: 18px;
            color: #999;
        }
        
        .apply-notice {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .apply-notice i {
            font-size: 20px;
            color: #1890ff;
        }
        
        .apply-notice-text {
            font-size: 15px;
            color: #333;
        }
        
        .apply-notice-text strong {
            color: #1890ff;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-label {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }
        
        .form-label .required {
            color: #ff4d4f;
            margin-left: 4px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fafafa;
        }
        
        .form-input:focus {
            border-color: #1890ff;
            background: #fff;
        }
        
        .apply-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            font-size: 14px;
            color: #666;
        }
        
        .apply-footer .phone {
            color: #1890ff;
            font-weight: 600;
        }
        
        .apply-actions {
            display: flex;
            gap: 12px;
        }
        
        /* 客服弹窗 */
        .contact-content {
            padding: 0 20px 28px;
            text-align: center;
        }
        
        .contact-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .contact-icon i {
            font-size: 32px;
            color: #1890ff;
        }
        
        .contact-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .contact-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .contact-phone-box {
            background: #f5f7fa;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .contact-phone-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .contact-phone-number {
            font-size: 28px;
            font-weight: 700;
            color: #1890ff;
        }
        
        .contact-actions {
            display: flex;
            gap: 12px;
        }
        
        .contact-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        
        .contact-btn.cancel {
            background: #f5f5f5;
            color: #666;
        }
        
        .contact-btn.confirm {
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-back">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="header-title">API接口服务</div>
        <div class="header-back" style="opacity: 0;">
            <i class="fas fa-chevron-left"></i>
        </div>
    </header>

    <!-- 搜索区域 -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索接口名称、ID或关键词...">
            <button class="search-btn" onclick="searchAPI()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- 分类标签 -->
    <div class="category-section">
        <div class="category-scroll" id="categoryList">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 统计 -->
        <div class="stats-bar">
            <div class="stats-title" id="statsTitle">全部接口</div>
            <div class="stats-count">共 <span id="statsCount">0</span> 个接口</div>
        </div>

        <!-- 接口列表 -->
        <div class="api-list" id="apiList">
            <!-- 动态生成 -->
        </div>

        <!-- 加载更多 -->
        <div class="load-more">
            <button class="load-more-btn" onclick="loadMore()">加载更多</button>
        </div>
    </main>



    <!-- 接口详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="hideDetailModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="detail-content">
                <div class="detail-header">
                    <div class="detail-icon">
                        <i class="fas fa-plug"></i>
                    </div>
                    <div class="detail-title-wrap">
                        <div class="detail-name" id="detailName">--</div>
                        <div class="detail-id" id="detailId">--</div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">所属分类</div>
                    <div class="detail-value" id="detailCategory">--</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">请求方式</div>
                    <div class="detail-value" id="detailMethod">GET</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">接口描述</div>
                    <div class="detail-value" id="detailDesc">--</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">接口地址</div>
                    <div class="detail-path" id="detailPath">--</div>
                </div>
                <div class="detail-actions">
                    <button class="detail-btn cancel" onclick="hideDetailModal()">关闭</button>
                    <button class="detail-btn apply" onclick="showApplyModalFromDetail()">申请接口</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 申请接口弹窗 -->
    <div class="modal-overlay" id="applyModal" onclick="hideApplyModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="apply-content">
                <div class="apply-header">
                    <div class="apply-title">申请接口</div>
                    <button class="apply-close" onclick="hideApplyModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="apply-notice">
                    <i class="fas fa-info-circle"></i>
                    <div class="apply-notice-text">您正在申请 <strong id="applyApiName">--</strong> 接口</div>
                </div>
                <form id="applyForm">
                    <div class="form-group">
                        <label class="form-label">联系人 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="contactName" placeholder="请输入联系人姓名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话 <span class="required">*</span></label>
                        <input type="tel" class="form-input" id="contactPhone" placeholder="请输入联系电话" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">公司名称</label>
                        <input type="text" class="form-input" id="companyName" placeholder="请输入公司名称（选填）">
                    </div>
                </form>
                <div class="apply-footer">
                    <i class="fas fa-phone-alt" style="color: #1890ff;"></i>
                    <span>官方客服电话：<span class="phone">400-999-4928</span></span>
                </div>
                <div class="apply-actions">
                    <button class="contact-btn cancel" onclick="hideApplyModal()">取消</button>
                    <button class="contact-btn confirm" onclick="submitApply()">提交申请</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 联系客服弹窗 -->
    <div class="modal-overlay" id="contactModal" onclick="hideContactModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="contact-content">
                <div class="contact-icon">
                    <i class="fas fa-headset"></i>
                </div>
                <h3 class="contact-title">联系客服</h3>
                <p class="contact-desc">如需申请API接口，请拨打客服电话咨询</p>
                <div class="contact-phone-box">
                    <div class="contact-phone-label">客服热线</div>
                    <div class="contact-phone-number">400-999-4928</div>
                </div>
                <div class="contact-actions">
                    <button class="contact-btn cancel" onclick="hideContactModal()">取消</button>
                    <a href="tel:400-999-4928" class="contact-btn confirm" style="text-decoration: none; text-align: center;">立即拨打</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API分类数据
        const categories = [
            { id: 'all', name: '全部接口', count: 79 },
            { id: 'gongshang', name: '工商信息', count: 15 },
            { id: 'sifa', name: '司法风险', count: 10 },
            { id: 'zhishi', name: '知识产权', count: 5 },
            { id: 'jingying', name: '经营信息', count: 8 },
            { id: 'zhaotoubiao', name: '招投标', count: 5 },
            { id: 'jingyingfengxian', name: '经营风险', count: 5 },
            { id: 'qiyefazhan', name: '企业发展', count: 5 },
            { id: 'shangshigongsi', name: '上市公司', count: 5 },
            { id: 'jianzhushichang', name: '建筑市场', count: 13 },
            { id: 'xinyongzhongguo', name: '信用中国', count: 2 },
            { id: 'teshuzhuti', name: '特殊主体', count: 4 },
            { id: 'tongyong', name: '通用接口', count: 2 }
        ];

        // 完整的79个API接口数据
        const apiData = {
            'gongshang': [
                { id: 'IC-001', name: '企业工商基本信息查询', desc: '查询企业工商登记基本信息，包括企业名称、法定代表人、注册资本、成立日期、经营状态、经营范围等。', method: 'GET', path: '/v1/company/base' },
                { id: 'IC-002', name: '企业分支机构查询', desc: '查询企业的分支机构列表，包括分支机构名称、负责人、经营状态、注册地址等信息。', method: 'GET', path: '/v1/company/branch' },
                { id: 'IC-003', name: '企业变更记录查询', desc: '查询企业历史工商变更记录，包括变更事项、变更前后内容及变更时间。', method: 'GET', path: '/v1/company/change' },
                { id: 'IC-004', name: '企业主要人员查询', desc: '查询企业主要人员信息，包括法定代表人、董事、监事、高管等人员名称及职务。', method: 'GET', path: '/v1/company/employee' },
                { id: 'IC-005', name: '企业曾用名查询', desc: '查询企业历史曾用名及更名时间，帮助追溯企业演变历史。', method: 'GET', path: '/v1/company/history-name' },

            }
        });

        // 渲染分类列表
        function renderCategoryList() {
            const container = document.getElementById('categoryList');
            let html = '';
            
            categories.forEach(cat => {
                const isActive = cat.id === currentCategory ? 'active' : '';
                html += `
                    <div class="category-tag ${isActive}" onclick="selectCategory('${cat.id}')">
                        ${cat.name}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 选择分类
        function selectCategory(categoryId) {
            currentCategory = categoryId;
            currentPage = 1;
            document.getElementById('searchInput').value = '';
            
            const cat = categories.find(c => c.id === categoryId);
            document.getElementById('statsTitle').textContent = cat ? cat.name : '全部接口';
            
            renderCategoryList();
            renderAPIList();
        }

        // 渲染接口列表
        function renderAPIList() {
            const container = document.getElementById('apiList');
            let apis = [];

            if (currentCategory === 'all') {
                Object.keys(apiData).forEach(catId => {
                    const cat = categories.find(c => c.id === catId);
                    apiData[catId].forEach(api => {
                        apis.push({ ...api, categoryId: catId, categoryName: cat ? cat.name : '' });
                    });
                });
            } else {
                const cat = categories.find(c => c.id === currentCategory);
                apis = (apiData[currentCategory] || []).map(api => ({
                    ...api,
                    categoryId: currentCategory,
                    categoryName: cat ? cat.name : ''
                }));
            }

            // 更新统计
            document.getElementById('statsCount').textContent = apis.length;

            // 分页
            const start = 0;
            const end = currentPage * pageSize;
            const displayApis = apis.slice(start, end);

            let html = '';
            displayApis.forEach(api => {
                html += `
                    <div class="api-card" onclick="showDetail('${api.id}', '${api.categoryId}')">
                        <div class="api-card-content">
                            <div class="api-header">
                                <span class="api-id">${api.id}</span>
                                <span class="api-method">${api.method}</span>
                            </div>
                            <div class="api-name">${api.name}</div>
                            <div class="api-desc">${api.desc}</div>
                            <div class="api-footer">
                                <span class="api-category">${api.categoryName}</span>
                                <div class="api-actions">
                                    <button class="api-btn detail" onclick="event.stopPropagation(); showDetail('${api.id}', '${api.categoryId}')">详情</button>
                                    <button class="api-btn apply" onclick="event.stopPropagation(); showApplyModal('${api.id}', '${api.categoryId}')">申请</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 是否显示加载更多
            const loadMoreBtn = document.querySelector('.load-more');
            if (apis.length <= end) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'block';
            }
        }

        // 加载更多
        function loadMore() {
            currentPage++;
            renderAPIList();
        }

        // 搜索
        function searchAPI() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                currentPage = 1;
                renderAPIList();
                return;
            }

            const container = document.getElementById('apiList');
            let results = [];

            Object.keys(apiData).forEach(catId => {
                const cat = categories.find(c => c.id === catId);
                apiData[catId].forEach(api => {
                    if (api.name.toLowerCase().includes(keyword) || 
                        api.id.toLowerCase().includes(keyword) ||
                        api.desc.toLowerCase().includes(keyword)) {
                        results.push({ ...api, categoryId: catId, categoryName: cat ? cat.name : '' });
                    }
                });
            });

            document.getElementById('statsCount').textContent = results.length;

            let html = '';
            results.forEach(api => {
                html += `
                    <div class="api-card" onclick="showDetail('${api.id}', '${api.categoryId}')">
                        <div class="api-card-content">
                            <div class="api-header">
                                <span class="api-id">${api.id}</span>
                                <span class="api-method">${api.method}</span>
                            </div>
                            <div class="api-name">${api.name}</div>
                            <div class="api-desc">${api.desc}</div>
                            <div class="api-footer">
                                <span class="api-category">${api.categoryName}</span>
                                <div class="api-actions">
                                    <button class="api-btn detail" onclick="event.stopPropagation(); showDetail('${api.id}', '${api.categoryId}')">详情</button>
                                    <button class="api-btn apply" onclick="event.stopPropagation(); showApplyModal('${api.id}', '${api.categoryId}')">申请</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<div style="text-align: center; padding: 40px; color: #999;">未找到相关接口</div>';
            document.querySelector('.load-more').style.display = 'none';
        }

        // 显示详情
        function showDetail(apiId, categoryId) {
            const api = apiData[categoryId]?.find(a => a.id === apiId);
            if (!api) return;

            const cat = categories.find(c => c.id === categoryId);
            currentApiForApply = { ...api, categoryId };

            document.getElementById('detailName').textContent = api.name;
            document.getElementById('detailId').textContent = api.id;
            document.getElementById('detailCategory').textContent = cat ? cat.name : '--';
            document.getElementById('detailMethod').textContent = api.method;
            document.getElementById('detailDesc').textContent = api.desc;
            document.getElementById('detailPath').textContent = api.path;

            document.getElementById('detailModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 隐藏详情
        function hideDetailModal(event) {
            if (!event || event.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').classList.remove('show');
                document.body.style.overflow = '';
            }
        }

        // 从详情页打开申请弹窗
        function showApplyModalFromDetail() {
            hideDetailModal();
            if (currentApiForApply) {
                showApplyModal(currentApiForApply.id, currentApiForApply.categoryId);
            }
        }

        // 显示申请弹窗
        function showApplyModal(apiId, categoryId) {
            const api = apiData[categoryId]?.find(a => a.id === apiId);
            if (!api) return;

            document.getElementById('applyApiName').textContent = api.name;
            document.getElementById('contactName').value = '';
            document.getElementById('contactPhone').value = '';

            document.getElementById('applyModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 隐藏申请弹窗
        function hideApplyModal(event) {
            if (!event || event.target === document.getElementById('applyModal')) {
                document.getElementById('applyModal').classList.remove('show');
                document.body.style.overflow = '';
            }
        }

        // 提交申请
        function submitApply() {
            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const company = document.getElementById('companyName').value.trim();

            if (!name) {
                alert('请输入联系人姓名');
                return;
            }
            if (!phone) {
                alert('请输入联系电话');
                return;
            }

            let successMsg = '申请提交成功！';
            if (company) {
                successMsg += `\n公司名称：${company}`;
            }
            successMsg += '\n客服将尽快与您联系。';
            
            alert(successMsg);
            hideApplyModal();
            document.getElementById('applyForm').reset();
        }

        // 显示联系客服弹窗
        function showContactModal() {
            document.getElementById('contactModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 隐藏联系客服弹窗
        function hideContactModal(event) {
            if (!event || event.target === document.getElementById('contactModal')) {
                document.getElementById('contactModal').classList.remove('show');
                document.body.style.overflow = '';
            }
        }
    </script>
</body>
</html>
